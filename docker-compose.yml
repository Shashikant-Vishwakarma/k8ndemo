version: "3.9"

services:
  api:
    image: k8n_db_sahil:1.0.0
    container_name: k8n-db-api
    ports:
      - "3000:3000"
    depends_on:
      - db
  db:
    image: k8n_postgres_sahil:1.0.0
    container_name: k8n-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: k8n
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: